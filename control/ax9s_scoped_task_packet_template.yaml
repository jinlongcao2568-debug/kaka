version: 1
packet_kind: EXECUTABLE_SCOPED_SUBPACKET
execution_mode: "{{EXECUTION_MODE}}"
source_blueprint_batch_id: "{{REGISTERED_BLUEPRINT_ID}}"
source_blueprint_registry_ref: control/source_blueprint_registry.yaml#registered_blueprints
backlog_packet_ref: "{{BACKLOG_PACKET_REF}}"
packet_id: "{{PACKET_ID}}"
subpacket_id: "{{PACKET_ID}}"
title: "{{TITLE}}"
status: DRAFT
objective: "{{OBJECTIVE}}"
depends_on: []
non_goals:
  - "not an external unlock implementation"
affected_stages: []
risk_level: HIGH
change_class: MANDATORY_HUMAN_REVIEW
change_domains:
  - automation_control_core
reviews:
  - automation_owner
  - architecture_owner
  - governance_owner
  - testing_owner
declared_changed_paths: []
baseline_dirty_paths: []
allowed_modification_paths: []
forbidden_modification_paths: []
impacted_assets:
  docs: []
  control: []
  contracts: []
  handoff: []
  scripts: []
  tests: []
  runtime: []
required_scripts:
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-task-packet.ps1
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-state-alignment.ps1
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-final-gate.ps1
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/clean-python-cache.ps1
  - git status --short --untracked-files=all
script_timeouts:
  scripts/check-task-packet.ps1: 300000
  scripts/check-state-alignment.ps1: 300000
  scripts/check-final-gate.ps1: 300000
  scripts/clean-python-cache.ps1: 300000
  git status --short --untracked-files=all: 120000
stop_conditions:
  - "required script fails"
  - "actual changed path falls outside declared scope"
  - "forbidden path touched"
definition_of_done:
  - "{{DEFINITION_OF_DONE}}"
deliverables:
  - "{{DELIVERABLE}}"
human_review_required: true
owner_reviews_required:
  - automation_owner
  - architecture_owner
  - governance_owner
  - testing_owner
review_evidence:
  declared: true
  signoff_required: true
  signoff_status: REQUESTED_NOT_APPROVED
notes:
  - "This template is the executable packet shape to be copied into control/current_task.yaml#currentTask.task_packet."
  - "execution_mode should normally be ACTIVATION_ONLY or SCOPED_EXECUTION; closeout is a workflow state, not a separate packet enum."
  - "The scoped subpacket must satisfy control/automation_task_packet_rules.yaml scope and review-gate constraints."
  - "source_blueprint_batch_id must be registered in control/source_blueprint_registry.yaml."
  - "Governance transition packets may live in control/current_task.yaml without being inserted into control/product_task_library.yaml."
  - "If current_task.yaml carries stage7 / stage8 / stage9 operator_assignment_roster, it must also carry operator_assignment_roster_source_ref=control/operator_assignment_roster_defaults.yaml#defaults and keep the copied roster aligned with that stable source."
