version: 1
packet_kind: EXECUTABLE_SCOPED_SUBPACKET
source_blueprint_batch_id: "{{REGISTERED_BLUEPRINT_ID}}"
blueprint_registry_ref: control/task_packet_library.yaml#blueprint_registry
packet_id: "{{PACKET_ID}}"
subpacket_id: "{{PACKET_ID}}"
title: "{{TITLE}}"
status: DRAFT
objective: "{{OBJECTIVE}}"
non_goals:
  - "not an external unlock implementation"
affected_stages: []
risk_level: HIGH
change_class: MANDATORY_HUMAN_REVIEW
change_domains:
  - automation_control_core
declared_changed_paths: []
baseline_dirty_paths: []
allowed_modification_paths: []
forbidden_modification_paths: []
impacted_assets:
  docs: []
  control: []
  contracts: []
  handoff: []
  scripts: []
  tests: []
  code: []
required_scripts:
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-semantic-alignment.ps1
script_timeouts:
  scripts/check-release.ps1: 300000
stop_conditions:
  - "required script fails"
definition_of_done:
  - "{{DEFINITION_OF_DONE}}"
deliverables:
  - "{{DELIVERABLE}}"
human_review_required: true
owner_reviews_required:
  - architecture_owner
  - governance_owner
  - testing_owner
review_evidence:
  declared: true
  signoff_required: true
  signoff_status: REQUESTED_NOT_APPROVED
notes:
  - "This template is the executable packet shape to be copied into control/current_task.yaml#currentTask.task_packet."
  - "The scoped subpacket must satisfy control/automation_task_packet_rules.yaml max scope constraints."
  - "source_blueprint_batch_id must be registered in control/task_packet_library.yaml#blueprint_registry; future packets do not have to use B10."
  - "If current_task.yaml carries stage7 / stage8 / stage9 operator_assignment_roster, it must also carry operator_assignment_roster_source_ref=control/task_packet_library.yaml#activation_defaults.operator_assignment_roster_defaults and keep the copied roster aligned with that stable source."
