    - control/ax9s_full_repair_status.yaml
    - control/ax9s_validation_matrix.yaml
    - control/ax9s_review_escalation_matrix.yaml
    - control/ax9s_window_prompt_template.md
    - control/ax9s_window_closeout_template.md
    - control/ax9s_scoped_task_packet_template.yaml
    - control/task_packets
    - control/reference_index.json
  contracts: []
  handoff: []
  scripts: []
  tests: []
  code: []
source_of_truth_refs:
  docs:
    - docs/L0.md
    - docs/裁决总表.md
    - docs/D1_研发_Codex执行手册.md
    - docs/D11_测试验收与金标回归清单.md
    - docs/D12_部署发布与运行治理规范.md
    - docs/D13_公开可查边界能力清单.md
    - docs/D14_AI模型治理规范.md
    - docs/技术实现决策页.md
