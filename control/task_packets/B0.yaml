allowed_modification_paths:
  - control/ax9s_full_repair_plan.yaml
  - control/ax9s_full_repair_status.yaml
  - control/ax9s_validation_matrix.yaml
  - control/ax9s_review_escalation_matrix.yaml
  - control/ax9s_window_prompt_template.md
  - control/ax9s_window_closeout_template.md
  - control/task_packets/**
  - control/reference_index.json
  - docs/文档与资产状态板.md
  - docs/AX9S_开发执行路由图.md
forbidden_modification_paths:
  - docs/L0.md
  - contracts/release/**
  - contracts/governance/**
  - src/**
  - tests/**
primary_outputs:
  - "Full-repair canonical execution plan and status ledger"
  - "B0-B10 machine-readable batch packets"
  - "Window bootstrap and closeout templates"
deliverables:
  - "Full-repair canonical execution plan and status ledger"
  - "B0-B10 machine-readable batch blueprints"
  - "Scoped subpacket template"
  - "Window bootstrap and closeout templates"
required_scripts:
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-task-packet.ps1
  - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-state-alignment.ps1
stop_conditions:
  - "A second formal status source is introduced."
  - "Any full-repair asset weakens blocked/governed controlled_opening_requirements."
  - "Any required script fails."
definition_of_done:
  - "A new window can determine the next batch from the status ledger without re-planning."
  - "A new window can read one canonical prompt template and one canonical batch packet."
  - "The sequence B0-B10 is fixed in a machine-readable plan."
next_batch_entry_rule: "B0 is already done; B1 is the first executable downstream batch."
required_owner_reviews:
  - automation_owner
  - architecture_owner
  - governance_owner
  - testing_owner
  - release_approver
review_evidence:
  declared: true
  signoff_required: true
  signoff_status: OWNER_APPROVED_AFTER_BOOTSTRAP_PREP
scope_limit_ref: control/automation_task_packet_rules.yaml#max_scope
suggested_execution_slices:
  - slice_id: B0-S0
    objective: "Bootstrap assets were already prepared in the repository; do not re-run as a new execution window."

