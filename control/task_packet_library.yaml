        - contracts/sales/competitor_confidence_catalog.json
        - contracts/sales/stage7_resolution_policy.json
        - contracts/sales/challenger_profile_catalog.json
      handoff:
        - handoff/stage6_to_stage7/contract.json
        - handoff/stage7_to_stage8/contract.json
    allowed_modification_paths:
      - docs/D3_正式规则码总表与判定说明书.md
      - docs/D8_真实竞争者识别可售对象与销售推进规范.md
      - docs/D11_测试验收与金标回归清单.md
      - contracts/sales/price_normalization_catalog.json
      - contracts/sales/competitor_confidence_catalog.json
      - contracts/sales/stage7_resolution_policy.json
      - contracts/sales/challenger_profile_catalog.json
      - contracts/testing/regression_manifest.json
      - src/shared/policy_executor.py
      - src/stage7_sales/service.py
      - tests/test_stage7_runtime_closure.py
      - tests/test_formal_sink_fields.py
      - tests/test_internal_chain.py
    forbidden_modification_paths:
