packets:
  - packet_id: PKT-P0-01-review-queue-window-scoring
    title: Stage6 复核优先级与窗口评分闭合
    priority: P0
    route_map_segment: R1_STAGE6_REVIEW_QUEUE_CLOSURE
    objective: 补齐 Stage6 review queue priority、bucket 迁移、window 影响的正式量化口径，去掉默认值与隐式实现裁决。
    non_goals:
      - 不扩展 external release
      - 不改 Stage7-9 外部能力边界
      - 不引入新对象族
      - 不改 L0 正文
      - not an external unlock implementation
    affected_stages: [stage6_fact_review, stage7_sales]
    risk_level: HIGH
    change_class: MANDATORY_HUMAN_REVIEW
    change_domains: [shared_runtime_core, governance_release_core, scripts_and_tests_general, automation_control_core]
    depends_on: []
    authority_refs:
      docs:
        - docs/L0.md
        - docs/D2_正式对象契约与字段字典.md
        - docs/D3_正式规则码总表与判定说明书.md
        - docs/D8_真实竞争者识别可售对象与销售推进规范.md
        - docs/D11_测试验收与金标回归清单.md
      contracts:
        - contracts/sales/window_value_policy_catalog.json
        - contracts/schemas/review_queue_profile.schema.json
        - contracts/rules/rule_catalog.json
        - contracts/testing/regression_manifest.json
      handoff:
        - handoff/stage5_to_stage6/contract.json
        - handoff/stage6_to_stage7/contract.json
    allowed_modification_paths:
      - docs/D2_正式对象契约与字段字典.md
      - docs/D3_正式规则码总表与判定说明书.md
      - docs/D8_真实竞争者识别可售对象与销售推进规范.md
      - docs/D11_测试验收与金标回归清单.md
      - contracts/sales/window_value_policy_catalog.json
      - contracts/rules/rule_catalog.json
      - contracts/schemas/review_queue_profile.schema.json
      - contracts/testing/regression_manifest.json
      - src/stage6_fact_review/fact_aggregator.py
      - src/shared/policy_executor.py
      - tests/test_stage56_evaluators.py
      - tests/test_internal_chain.py
      - tests/test_pre_route_behavior.py
    forbidden_modification_paths:
      - docs/L0.md
      - docs/D1_研发_Codex执行手册.md
      - docs/D9_联系对象与销售触达规范.md
      - docs/D10_订单支付交付与治理反馈规范.md
      - contracts/release/**
      - src/stage8_outreach/**
      - src/stage9_delivery/**
      - src/api/**
    acceptance_assertions:
      - review_queue_priority_score must be derived not hardcoded
      - review_queue_bucket escalation and downgrade rules must be machine-readable
      - window thresholds must stay aligned across D8, contracts, runtime, and D11
      - no Stage6 default score may remain as authoritative business decision
    required_scripts:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-semantic-alignment.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/validate-contracts.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-golden.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-release.ps1
      - python tests/run_tests.py
    stop_conditions:
      - any threshold drift between docs and contracts
      - any Stage6/7 handoff field drift
      - any script failure in required_scripts
    definition_of_done:
      - review queue scoring formula frozen in docs and contracts
      - Stage6 runtime consumes the frozen formula rather than default literal
      - D11 regression covers priority, bucket, and window migration
    deliverables:
      - review queue scoring patch set
      - window scoring alignment patch set
      - regression coverage for Stage6 queue behavior
    human_review_required: true
    owner_reviews_required: [automation_owner, architecture_owner, governance_owner, testing_owner, release_approver]
    review_evidence:
      declared: true
      signoff_required: true
      signoff_status: REQUESTED_NOT_APPROVED

