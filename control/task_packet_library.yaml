        - contracts/sales/buyer_fit_scorecard.json
        - contracts/sales/opportunity_policy_catalog.json
        - contracts/sales/opportunity_catalog.json
      handoff:
        - handoff/stage6_to_stage7/contract.json
        - handoff/stage7_to_stage8/contract.json
    allowed_modification_paths:
      - docs/D2_正式对象契约与字段字典.md
      - docs/D3_正式规则码总表与判定说明书.md
      - docs/D8_真实竞争者识别可售对象与销售推进规范.md
      - docs/D11_测试验收与金标回归清单.md
      - contracts/sales/lead_value_scoring_catalog.json
      - contracts/sales/buyer_fit_scorecard.json
      - contracts/sales/opportunity_policy_catalog.json
      - contracts/sales/opportunity_catalog.json
      - contracts/testing/regression_manifest.json
      - src/shared/policy_executor.py
      - src/stage7_sales/service.py
      - tests/test_arch_optimization_a.py
      - tests/test_formal_sink_fields.py
      - tests/test_stage7_runtime_closure.py
    forbidden_modification_paths:
      - docs/L0.md
      - docs/D9_联系对象与销售触达规范.md
      - docs/D10_订单支付交付与治理反馈规范.md
      - contracts/release/**
      - src/stage8_outreach/**
      - src/stage9_delivery/**
    acceptance_assertions:
      - buyer_fit dimensions must have formal derivation sources
      - project_value_score, lead_score, opportunity_value_score must align with catalog weights and gating
      - expected_close_days_band and expected_delivery_cost_band must not remain free default placeholders
      - why_recommended must derive from formal rule outputs not arbitrary prose
    required_scripts:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-semantic-alignment.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/validate-contracts.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-golden.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-release.ps1
      - python tests/run_tests.py
    stop_conditions:
      - buyer_fit remains seeded from opaque code-only defaults
      - expected bands remain UNKNOWN-only placeholders
      - required scripts fail
    definition_of_done:
      - buyer_fit derivation frozen in docs/contracts
      - Stage7 runtime consumes frozen derivation
      - D11 regression added for value/banding closure
    deliverables:
      - buyer fit derivation patch set
      - value scoring closure patch set
      - expected band derivation patch set
    human_review_required: true
    owner_reviews_required: [automation_owner, architecture_owner, governance_owner, testing_owner, release_approver]
    review_evidence:
      declared: true
      signoff_required: true
      signoff_status: REQUESTED_NOT_APPROVED

