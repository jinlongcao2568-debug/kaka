activation_rules:
  - only_one_packet_may_be_active_at_a_time
  - activate_by_copying_one_blueprint_into_currentTask.task_packet
  - packet_scope_change_requires_new_packet_or_new_version
  - every_packet_must_stop_and_report_after_required_scripts
  - route_map_remains_navigation_only_not_status_source
activation_defaults:
  mandatory_non_goals_tokens:
    - not an external unlock implementation
  mandatory_change_domains:
    - automation_control_core
  add_shared_runtime_core_when_paths_include:
    - src/shared/capability_runtime.py
    - src/shared/policy_executor.py
    - src/shared/runtime_validator.py
    - src/shared/contracts_runtime.py
    - src/shared/pipeline.py
  mandatory_review_fields_for_change_class:
    MANDATORY_HUMAN_REVIEW:
      human_review_required: true
      review_evidence:
        declared: true
        signoff_required: true
        signoff_status: REQUESTED_NOT_APPROVED
  owner_review_defaults:
    add_automation_owner_when_domains_include:
      - automation_control_core
    add_release_approver_when_domains_include:
      - governance_release_core
      - future_external_unlock_prereq_core
      - future_external_unlock_decision
    add_model_governance_owner_when_domains_include:
      - provider_vendor_source_policy_core
      - future_external_unlock_prereq_core
      - future_external_unlock_decision
    default_high_risk_owner_reviews:
      - architecture_owner
      - governance_owner
      - testing_owner
