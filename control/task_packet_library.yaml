    title: Stage7 价格归一与竞争者排序闭合
    priority: P0
    route_map_segment: R1_STAGE7_PRICE_COMPETITOR
    objective: 把价格归一、报价带、competitor entity resolution、TopN 排序规则从 code-local heuristic 收到 formal contracts。
    non_goals:
      - 不放开 external quote or delivery promises
      - 不新建第二套 competitor object
      - 不改 Stage8/9 能力边界
      - not an external unlock implementation
    affected_stages: [stage7_sales]
    risk_level: HIGH
    change_class: MANDATORY_HUMAN_REVIEW
    change_domains: [shared_runtime_core, governance_release_core, scripts_and_tests_general, automation_control_core]
    depends_on: [PKT-P0-02-stage7-buyer-fit-value-derivation]
    authority_refs:
      docs:
