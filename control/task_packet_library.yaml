      - docs/D9_联系对象与销售触达规范.md
      - docs/D10_订单支付交付与治理反馈规范.md
      - src/stage8_outreach/**
      - src/stage9_delivery/**
      - contracts/release/**
    acceptance_assertions:
      - price normalization must formalize tax/unit/lot/reference semantics
      - competitor ranking must no longer depend on implicit service-only formula
      - top_n retention and candidate-only truncation must be machine-readable
      - entity resolution or alias handling must have formal contract hooks
    required_scripts:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-semantic-alignment.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/validate-contracts.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/run-golden.ps1
      - pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-release.ps1
      - python tests/run_tests.py
    stop_conditions:
      - competitor ranking still only encoded in service-local helper
      - price conflict thresholds widen without synchronized D8/D11 updates
      - required scripts fail
    definition_of_done:
      - price and competitor resolution policies are formalized
      - Stage7 runtime and contracts are aligned
      - regression covers top_n, cutoff, conflict, and price band behavior
    deliverables:
      - price normalization closure patch set
      - competitor resolution closure patch set
      - Stage7 ranking regression patch set
    human_review_required: true
    owner_reviews_required: [automation_owner, architecture_owner, governance_owner, testing_owner, release_approver]
