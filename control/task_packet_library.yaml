    title: Stage7 buyer fit 与价值评分来源闭合
    priority: P0
    route_map_segment: R1_STAGE7_VALUE_DERIVATION
    objective: 把 buyer_fit 输入来源、project/lead/opportunity value derivation、expected bands 口径收成正式 contracts + runtime。
    non_goals:
      - 不引入模型作为最终决策者
      - 不放开推荐结果对外承诺
      - 不做 Stage8/9 live execution
      - 不改 D10 正文
      - not an external unlock implementation
    affected_stages: [stage7_sales]
    risk_level: HIGH
    change_class: MANDATORY_HUMAN_REVIEW
    change_domains: [shared_runtime_core, governance_release_core, scripts_and_tests_general, automation_control_core]
    depends_on: [PKT-P0-01-review-queue-window-scoring]
    authority_refs:
