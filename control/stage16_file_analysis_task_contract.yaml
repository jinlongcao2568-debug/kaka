batches:
  - batch_id: B0_EXPERIENCE_LIBRARY_MAPPING_BASELINE
    priority: P0
    stage_scope: [Stage1, Stage2, Stage3, Stage4, Stage5, Stage6]
    status: FIRST_CUT_IMPLEMENTED
    objective: "固定经验库能力到现有对象、字段、规则、调用链、样本、脚本和最小验收口径的映射。"
    deliverables:
      - experience_library_to_runtime_mapping
      - current_entrypoint_call_chain_inventory
      - real_or_fixture_sample_matrix
      - runnable_minimum_validation_commands
      - gap_table_for_stage1_to_stage6
    acceptance_checks:
      - "列明 Stage2 附件发现/下载/归档/challenge 处理入口。"
      - "列明 Stage3 文件解析和字段血缘入口。"
      - "列明 Stage4 项目经理/负责人核验和附件证据 carrier。"
      - "列明 Stage5 规则门、证据门、review request。"
      - "列明 Stage6 project_fact、报告、复核队列入口。"

  - batch_id: B1_LEGAL_SYSTEM_CLASSIFIER
    priority: P0
    stage_scope: [Stage1, Stage2, Stage3, Stage6]
    status: FIRST_CUT_IMPLEMENTED
    objective: "识别法律体系、采购/招标方式、采购类别和救济路径候选，作为所有后续规则判断的前置分类。"
    candidate_outputs:
      - procurement_regime
      - procurement_category
      - legal_system_type_candidate
      - fund_source_type
      - regulator_route_candidate
      - remedy_path_candidate
    acceptance_checks:
      - "区分政府采购法体系、招标投标法体系、政府采购工程、国企/平台采购和混合/未知场景。"
      - "legal_system_type_candidate 只是草案辅助标签，不替代 D2/D13 正式对象字段。"
      - "制度不明时只能输出 review 或补证建议，不得套用单一招投标规则。"
      - "救济路径必须区分政府采购质疑/投诉和招标投标异议/投诉。"

  - batch_id: B2_PRE_NOTICE_OPPORTUNITY_POLICY_RULES
    priority: P0
    stage_scope: [Stage1, Stage2, Stage3, Stage6]
    status: FIRST_CUT_IMPLEMENTED
    objective: "承接采购意向、招标计划、招标文件提前公示、公平竞争、需求管理、本国产品政策、远程异地评标、AI机器审查和地区画像。"
    candidate_outputs:
      - pre_notice_type
      - source_channel_type
      - project_lifecycle_stage
      - policy_rule_signal
      - fair_competition_barrier_type
      - regional_bid_rule_type
      - source_quality_score
    acceptance_checks:
      - "采购意向、招标计划、招标文件提前公示只能进入关注池，不写成确定项目。"
      - "政策规则必须有正式政策或公开平台规则回链。"
      - "地区画像不得写成地区确定性规则。"

  - batch_id: B3_AI_INTELLIGENCE_PROJECT_ARCHIVE
    priority: P0
    stage_scope: [Stage1, Stage2, Stage3, Stage7]
    status: FIRST_CUT_IMPLEMENTED
    objective: "建立来源质量、分类标签、项目档案夹和时间节点链。"
    candidate_outputs:
      - project_intelligence_folder
      - project_category_taxonomy
      - owner_actor_profile
      - agency_actor
      - competitor_history_profile
      - project_timeline_chain
      - followup_record_state
    acceptance_checks:
      - "AI 采集只做字段收集、清洗、分类和来源质量反馈，不替代最终判断。"
      - "圈子、社群、评论区只能作为弱线索，不得进入正式证据链。"
      - "项目档案必须保留基础信息、人员信息、竞争情报、时间节点和跟进记录。"

  - batch_id: B4_DOCUMENT_COMPLETENESS_VERSION_LINEAGE
    priority: P0
    stage_scope: [Stage2, Stage3]
    status: FIRST_CUT_IMPLEMENTED
    objective: "稳定获取附件、归档版本并解析字段来源。"
    candidate_outputs:
      - attachment_snapshot_refs
      - document_completeness_state
      - notice_version_chain
      - download_archive_manifest
      - field_lineage_record
      - parsed_fields
      - parse_state
      - parse_error_taxonomy
    acceptance_checks:
      - "识别详情页附件并区分招标文件、补遗、答疑、评标报告、候选公示。"
      - "记录 hash、来源 URL、下载时间、文件名、content-type、项目和公告版本绑定关系。"
      - "PDF、Word、Excel、HTML 进入统一解析流程，扫描件进入 OCR_REQUIRED 或受控 OCR。"
      - "字段可回链到附件、页码、文本切片和置信度。"
      - "下载或解析失败有原因分类，不假装成功。"

  - batch_id: B5_MAINLINE_RISK_AND_BID_DECISION
    priority: P1
    stage_scope: [Stage3, Stage4, Stage5, Stage6, Stage7]
    status: FIRST_CUT_IMPLEMENTED
    objective: "项目筛选、控标预测、自评分、废标红线、盲投运营的内部闭环。"
    candidate_outputs:
      - bid_selection_score
      - tailored_bid_risk_level
      - self_score_forecast
      - control_bias_signal
      - qualification_clause_hits
      - evaluation_method_profile
      - fatal_rejection_risk_hits
      - abnormal_low_price_trigger
      - blind_bid_pipeline_stage
    acceptance_checks:
      - "项目筛选不得承诺中标率，只能给内部投入产出和风险分层。"
      - "控标预测只能输出疑似量身定制、指向性、排他性或资料不对称线索。"
      - "自评分必须基于我方材料库或明确内部输入。"
      - "废标红线必须区分一票否决、扣分、澄清补正、形式瑕疵和事后争议难度。"
      - "项目经理/负责人抽取和资格/信用/业绩材料作为核心输入继续推进。"

  - batch_id: B6_PUBLIC_VERIFICATION_DUAL_GATES_REPORT
    priority: P1
    stage_scope: [Stage4, Stage5, Stage6]
    status: FIRST_CUT_IMPLEMENTED
    objective: "公开证据 carrier 进入规则门、证据门、复核队列和报告。"
    candidate_outputs:
