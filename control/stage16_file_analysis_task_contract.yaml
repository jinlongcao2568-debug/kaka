anti_drift_rules:
  - "继续使用 Stage1-9 主链，不新造第二套阶段体系。"
  - "经验库草案只能先作为候选规则池，不直接成为正式 D2/D3 规则源。"
  - "Stage2 必须保留附件归档、hash、来源 URL、版本链和下载失败原因。"
  - "Stage3 只做解析和字段血缘，不输出法律结论。"
  - "Stage4 只生成公开核验证据 carrier，保留来源、时间、置信度和证据缺口。"
  - "Stage5 必须经过规则门和证据门；字段命中不等于风险成立。"
  - "Stage6 形成统一 project_fact、复核队列和报告记录。"
  - "产品能力顺序以经验库草案第 12 节为准；Stage1-6 是当前落地承载链。"
  - "附件归档是基础支撑层，不是第一产品能力；第一产品能力是两法体系分流器。"
  - "Stage7-10 能力不得反向污染 Stage1-6 的公开证据完成标准。"
  - "新增正式对象、枚举、schema、migration、规则码或跨阶段机器契约前，先定位现有 contracts、tests、scripts 和调用链。"
  - "对外触达、支付、交付、退款、真实线索包外发仍受 release checklist、审批链、审计链和 operator action 约束。"

stage4_5_rule_formalization_boundary:
  admission_criteria:
    - explicit_trigger_condition
    - public_evidence_available
    - field_lineage_or_readback_available
    - rule_basis_or_stable_internal_governance_basis
    - conservative_output_only
    - dual_gate_evaluable
  capability_routing:
    pre_classification_or_field:
      stages: [Stage1, Stage2, Stage3]
      examples:
        - legal_system_classifier
        - pre_notice_opportunity
        - source_registry_and_project_intelligence
        - regional_rule_profile
      stage5_rule_allowed: false
    stage4_verification_carrier:
      stages: [Stage4]
      examples:
        - project_manager_verification
        - qualification_credit_performance_verification
        - public_file_readback
      stage5_rule_allowed: "input_only"
    stage5_rule:
      stages: [Stage5]
      outputs:
        - rule_hit
        - rule_gate_decision
        - evidence_gate_decision
        - review_request
      stage5_rule_allowed: true
    stage6_report:
      stages: [Stage6]
      examples:
        - project_fact
        - review_queue_profile
        - report_record
      stage5_rule_allowed: false
    deferred_enhancement:
      stages: [Stage7, Stage8, Stage9, Stage10, Enhancement]
      examples:
        - dark_bid_internal_qa
        - signature_declaration_tax_review
        - electronic_bid_environment_review
        - contract_payment_settlement_review
      stage5_rule_allowed: false
  initial_rule_formalization_scope:
    - evidence_completeness_rule
    - legal_system_applicability_gate
    - project_manager_and_qualification_verification_rule
    - fatal_rejection_redline_rule
    - tailored_or_restrictive_competition_weak_rule
  deferred_from_current_stage1_6_rules:
    - dark_bid_positive_deviation_signature_declaration_tax_electronic_supervision
    - full_remedy_complaint_contract_payment_settlement
    - regional_good_or_bad_bid_conclusions
    - illegality_crime_or_reserved_winner_conclusions
    - ai_generated_or_informal_commentary_as_primary_basis

