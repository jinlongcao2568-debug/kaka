version: 1
id: automation_task_packet_rules
owner_docs:
  - D1
  - 自动化开发动作门禁表
task_packet_source:
  file: control/current_task.yaml
  path: currentTask.task_packet
source_blueprint_registry_source:
  file: control/source_blueprint_registry.yaml
  path: registered_blueprints
  validation_field: source_blueprint_batch_id
  rule: source_blueprint_batch_id must match a registered blueprint_id in control/source_blueprint_registry.yaml.
operator_assignment_roster_source:
  file: control/operator_assignment_roster_defaults.yaml
  path: defaults
single_focus:
  required: true
  rule: one stage or one theme per batch
split_required_when:
  - cross_stage_changes
  - payment_or_delivery_or_outreach_execution
  - external_facing_changes
ordering_rules:
  - docs_first_then_machine_assets
  - control_updates_require_stop_and_report
stop_rules_alignment:
  - batch_stop_rules_from_agents: true
classification_source: control/review_gate_matrix.yaml
required_fields:
  - source_blueprint_batch_id
  - objective
  - non_goals
  - affected_stages
  - declared_changed_paths
  - allowed_modification_paths
  - forbidden_modification_paths
  - impacted_assets
  - required_scripts
  - stop_conditions
  - definition_of_done
  - deliverables
  - risk_level
  - change_class
  - change_domains
  - human_review_required
  - owner_reviews_required
field_rules:
  source_blueprint_batch_id: source_blueprint_registry.registered_blueprints.blueprint_id
  objective: non_empty_string
  non_goals: non_empty_array
  affected_stages: non_empty_array
  declared_changed_paths: non_empty_array
  allowed_modification_paths: non_empty_array
  forbidden_modification_paths: non_empty_array
  impacted_assets: non_empty_object
  required_scripts: non_empty_array
  stop_conditions: non_empty_array
  definition_of_done: non_empty_array
  deliverables: non_empty_array
  risk_level: enum(HIGH,MEDIUM,LOW)
  change_class: review_gate_matrix.change_classes.id
  change_domains: non_empty_array
  human_review_required: boolean
  owner_reviews_required: array
requires_task_packet_for:
  - "src/**"
  - "tests/**"
  - "scripts/**"
  - "control/automation_*.yaml"
  - "control/review_gate_matrix.yaml"
  - "contracts/governance/**"
  - "contracts/release/**"
  - "contracts/testing/regression_manifest.json"
  - "contracts/testing/release_checklist.json"
  - "contracts/model/**"
  - "contracts/sales/source_vendor_usage_policy.json"
  - "contracts/sales/channel_vendor_execution_policy.json"
fail_conditions:
  - source_blueprint_batch_id_not_registered
  - missing_required_fields
  - missing_declared_changed_paths
  - planned_target_path_not_declared
  - planned_target_path_not_allowed
  - planned_target_path_forbidden
  - actual_changed_path_not_allowed
  - change_class_below_required
  - missing_human_review_for_non_low_risk
  - missing_required_owner_review
  - forbidden_path_touched
  - operator_roster_source_ref_missing
  - operator_roster_stage_missing
  - operator_roster_stage_drift
preflight_checks:
  entrypoint: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-task-packet.ps1 -PlannedTargetPaths <paths>
  required_rule: planned target paths / intended changed files must match declared_changed_paths and allowed_modification_paths before editing or commit
notes:
  - there is no single repository-wide max_files, max_docs, max_control, or max_machine_assets hard cap
  - whether a task should split is decided by single_focus, declared/allowed/forbidden paths, review gate, and stop conditions
  - high-risk domains must be isolated in their own batch
  - task packet cannot be replaced by conversational summary; control/current_task.yaml is the formal machine-readable packet source
  - source_blueprint_batch_id is validated against control/source_blueprint_registry.yaml
  - stage7/stage8/stage9 roster defaults come from control/operator_assignment_roster_defaults.yaml
  - generated Python cache artifacts under __pycache__ and .pytest_cache are not treated as business-scope actual changed paths by task-packet validation
