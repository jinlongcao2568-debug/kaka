notes:
  - "This file tracks prerequisite baseline status only."
  - "control/external_unlock_prerequisite_state.yaml is a status mirror and not a canonical capability semantic source."
  - "repo_readiness_at_decision_time and candidate_gap_status_at_decision_time are historical R6 decision-time snapshots, not current repo status sources."
  - "READY_FOR_FUTURE_UNLOCK_DECISION_BATCH does not mean external release or live execution is unlocked."
  - "R6 decision is completed in a separate decision matrix/state layer; prerequisite completion still does not authorize implementation."
  - "leadpack candidate matrix adds the projection-only boundary required for the candidate gap batch."
  - "leadpack activation prep assets are review-only prerequisites and still do not authorize activation or external delivery."
  - "leadpack activation design / implementation prep assets define pre-implementation gates only and still do not authorize activation, implementation, external delivery or live execution."
