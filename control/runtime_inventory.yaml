never_default_open_capabilities:
  - "personal contact channels"
  - "D-tier or governed inputs on external surfaces"
  - "direct stage8/stage9 object export"
notes:
  - "Future external tier is reserved only and not released."
  - "control/runtime_inventory.yaml is a projection-only control surface for capability and future-unlock state."
  - "family current mode / priority order / protected short-circuit / release_layer controlled_opening_requirement all project from contracts/release/runtime_policy_catalog.json."
  - "capability_mode is a runtime dimension and does not replace release_layer."
  - "EXTERNAL_CONTROLLED_OPENING remains the external controlled opening requirement until prerequisites, approval, audit and operator action are satisfied."
  - "future_unlock_tier is a prerequisite/deployment decision dimension and does not itself authorize unlock."
  - "future_unlock_decision_matrix adds strategic sequencing and candidate/deny/blocked classification without authorizing implementation."
