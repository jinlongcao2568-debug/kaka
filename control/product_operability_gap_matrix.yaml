recommended_execution_order_after_reassessment:
  principle: >
    Build the evidence-pack product from source truth toward commercial
    execution. Provider/live adapters remain necessary, but they should not be
    the next implementation before durable infra and the real public data chain
    exist, otherwise sales/payment work would only automate preview data.
  sequence:
    - packet_ref: PTL-I100-112-production-platform-infrastructure
      reason: "Production durability, queue/worker, object storage, audit persistence, and health checks are prerequisites for real source ingestion and provider execution."
    - packet_ref: PTL-I100-113-stage1-scheduler-production-loop
      reason: "Scheduler turns one-off internal runs into repeatable discovery and execution windows."
    - packet_ref: PTL-I100-114-stage2-real-public-source-adapters
      reason: "Real public-source capture is required before the product can sell evidence based on real notices and attachments."
    - packet_ref: PTL-I100-115-stage3-real-parser-ocr-attachments
      reason: "Real parsing/OCR/attachment extraction is required before verification and rules can be reliable."
    - packet_ref: PTL-I100-116-stage4-public-verification-adapters
      reason: "Public verification adapters establish evidence credibility and legal/commercial safety."
    - packet_ref: PTL-I100-116A-project-manager-active-conflict-vertical-slice
      reason: "Project-manager active conflict is a core sellable evidence vertical slice and must be verified before rule/product packaging hardening."
    - packet_ref: PTL-I100-117-rule-factory-expansion-and-golden-cases
      reason: "Expanded rules convert verified data into scalable evidence-package logic."
    - packet_ref: PTL-I100-119A-real-challenger-identification-hardening
      reason: "Real challenger identification is the commercial buyer logic that determines who should be sold the evidence pack."
    - packet_ref: PTL-I100-119-stage6-product-package-hardening
      reason: "Stage6 must decide objection viability, evidence strength, delivery eligibility, and sales readiness before external sales actions."
    - packet_ref: PTL-I100-111E-provider-reliability-and-circuit-breaker
      reason: "Provider health, rate limit, timeout, retry, circuit breaker, and suspended fallback should be in place before provider execution expands."
