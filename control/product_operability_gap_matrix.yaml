matrix_id: PTL-I100-1100_PRODUCT_OPERABILITY_GAP_MATRIX
task_id: PTL-I100-1100-product-operability-full-audit
status: PTL_I100_131_CONTROLLED_REAL_WORLD_E2E_ACCEPTED
updated_at: "2026-04-26"
source_ledger: control/product_doc_runtime_coverage_ledger.yaml
source_ledger_id: PTL-I100-107C_PRODUCT_DOC_RUNTIME_COVERAGE_LEDGER
purpose: >
  Machine-readable product operability audit. This file answers whether each
  product-doc capability can be used by the owner to operate an evidence-pack /
  lead-pack sales business, or whether it is only preview/readiness, blocked,
  missing runtime, or not part of the sold product model.
product_model:
  internal_software_user: "卡卡罗特"
  sold_product: "evidence_pack_and_leadpack"
  not_sold_product: "external_software_platform"
  required_business_capabilities:
    - "source_to_evidence_chain"
    - "sales_opportunity_and_quote"
    - "sales_outreach_execution"
    - "leadpack_export_and_delivery"
    - "order_payment_delivery"
    - "operator_workbench_readback"
  open_capability_policy:
    policy_id: PTL-I100-OPEN-CAPABILITY-BASELINE
    baseline_rule: "Except automated refund execution, every business capability required to sell evidence packs / lead packs is a target capability and must be moved through staged controlled opening."
    live_default: BLOCKED
    state_order:
      - NOT_IMPLEMENTED
      - INTERNAL_READY
      - SANDBOX_READY
      - APPROVAL_READY
      - LIVE_READY
      - PRODUCTION_READY
      - SUSPENDED
    target_capabilities_to_open_under_control:
      - source_to_evidence_chain
      - real_public_source_collection
      - real_parser_ocr_attachment_extraction
      - public_verification_adapters
      - rule_factory_expansion
      - stage6_product_package_hardening
      - real_challenger_identification
      - crm_sync
      - quote_execution
      - leadpack_customer_visible_page
      - formal_export_artifacts
      - sales_outreach_execution
      - payment_collection
      - charge_execution
      - delivery_fulfillment
      - receipt_invoice_record
      - settlement_reconciliation
      - operator_customer_access
      - production_monitoring_alerting_rollback
    gated_live_capabilities:
      - sales_outreach_execution
      - customer_visible_page_publication
      - formal_export_delivery
      - payment_collection
      - charge_execution
      - delivery_fulfillment
    excluded_capabilities:
      - automated_refund_execution
      - private_or_non_public_data_collection
      - gray_source_collection
      - unauthorized_identity_or_social_security_query
      - captcha_or_login_bypass
      - unreviewed_legal_document_external_send
    completion_gate: PTL-I100-118-full-product-operational-acceptance
  refund_policy:
    automated_refund_program: false
    allowed_refund_handling: "manual_exception_record_and_governed_review_only"
    disallowed_refund_handling: "automated_refund_execution"
acceptance_model:
  engineering_regression:
    meaning: "Existing repo behavior remains valid."
    required_evidence:
      - "targeted tests pass"
      - "formal checks pass"
      - "full test suite passes when required by packet"
      - "actual changed paths stay inside active packet allowed paths"
  capability_state:
    meaning: "Each product capability must declare the state it reached, not just that tests passed."
    state_order:
      - NOT_IMPLEMENTED
      - INTERNAL_READY
      - SANDBOX_READY
      - APPROVAL_READY
      - LIVE_READY
      - PRODUCTION_READY
      - SUSPENDED
  product_closure:
    meaning: "Capability is judged against the owner selling evidence/lead packs, not against internal preview alone."
    required_answer: "Can the owner actually use this capability to operate the evidence-pack business?"
    refund_boundary: "automated refund execution remains excluded; refund handling is manual exception and governed review only."
operability_state_vocabulary:
  - OPERABLE_NOW_INTERNAL
  - PREVIEW_OR_REVIEW_ONLY
  - NEEDS_PRODUCT_IMPLEMENTATION
  - NOT_REQUIRED_FOR_EVIDENCE_PACK_BUSINESS
rollup_counts:
  OPERABLE_NOW_INTERNAL: 13
  PREVIEW_OR_REVIEW_ONLY: 4
  NEEDS_PRODUCT_IMPLEMENTATION: 5
  NOT_REQUIRED_FOR_EVIDENCE_PACK_BUSINESS: 1
  TOTAL_CAPABILITIES: 23
decision_summary:
  not_many_blank: false
  true_missing_runtime_count_from_ledger: 1
  practical_product_gap_count: 5
  gap_accounting_note: >
    The product-doc runtime coverage ledger is useful for internal runtime/test
    coverage, but 118 acceptance must separate completed readiness/readback
    carriers from actual owner-operable sales execution. Internal chain,
    sandbox readiness, live-pilot readback, and SLO readiness do not by
    themselves prove customer-visible delivery or real provider execution.
  main_gap_summary: >
    PTL-I100-112 through PTL-I100-121C closed the registered engineering and
    readiness packets, but 118 acceptance does not pass full product closeout:
    sales outreach, external quote/CRM handoff, customer-visible LeadPack
    publication/download, and payment/delivery remain gated readback or live
    pilot carriers rather than actual provider/customer execution. External
    software release remains not required for the evidence-pack business model.
  open_capability_summary: >
    The target product posture is not permanent internal preview. Except for
    automated refund execution and prohibited non-public/gray capabilities, every
    business capability needed to sell evidence packs and lead packs must be
    implemented through the task pool and moved stepwise through internal,
    sandbox, approval, live, and production readiness. Live execution remains
    blocked by default until the dedicated packet and acceptance gates pass.
  implementation_progress_summary: >
    PTL-I100-112 through PTL-I100-121C are recorded as completed in
    control/current_task.yaml and control/repo_status.md. The current 118
    result is a product acceptance block, not an engineering regression block:
    owner can operate the internal evidence/readback chain, but cannot yet
    close the full sales-to-customer-delivery loop without manual/external
    steps outside the governed product runtime.
  post_122_126_reacceptance_summary: >
    PTL-I100-122 through PTL-I100-126 closed the original 118 blockers as
    controlled execution/readback paths, but the runtime still uses local
    controlled fake providers and no productized frontend app is present. Final
    real-world owner usability therefore still needs frontend, real-source field
    validation, real provider binding including WeCom, governed LLM assistance,
    and a controlled real-world e2e pilot.
