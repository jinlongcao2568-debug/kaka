    sqlite opt-in envelope persistence while keeping json-file default
    compatibility. PTL-I100-110B completed governed outreach execution
    outbox/readback/replay, still without real vendor send or external/live
    unlock. PTL-I100-110C completed the Stage7 CRM/quote owner-operated
    sales workbench via commit 1d7cb80. PTL-I100-110D completed
    LeadPack/evidence-pack package/page/readback via commit 43169f4.
    PTL-I100-110E is active to close the final current product gap:
    order/payment/delivery execution ledger, with refund manual-exception only.
