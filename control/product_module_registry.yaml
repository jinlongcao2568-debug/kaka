        exit_criteria:
          - "核验输出保持公开来源和证据等级 trace。"
        deferred_gaps: []
      - slice_id: stage4.attack_surface_evidence_grade
        business_summary: "建立攻击面、伪竞争者信号和证据等级，作为 Stage5 规则/证据双闸门输入。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage4_verification/attack_surface.py
          - src/stage4_verification/evidence_grade.py
        handoff_files:
