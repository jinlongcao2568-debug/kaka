          - src/stage3_parsing/project.py
        handoff_files:
          - handoff/stage3_to_stage4/contract.json
        api_surface_files:
          - src/api/routes/stage3.py
          - src/api/schemas/stage3.py
        repository_files: []
        test_files:
          - tests/test_internal_chain.py
          - tests/test_architecture_anti_drift.py
        depends_on_slices:
          - stage2.public_chain_ingestion
        target_packet_candidates:
          - PTL-S34-object-lineage-verification-handoff
        exit_criteria:
          - "project_base 不缺关键 lineage 字段。"
        deferred_gaps: []
      - slice_id: stage3.lineage_candidates_manager
        business_summary: "维护字段 lineage、候选人/候选单位、项目经理等关键对象。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage3_parsing/lineage.py
          - src/stage3_parsing/candidate.py
          - src/stage3_parsing/manager.py
        handoff_files:
          - handoff/stage3_to_stage4/contract.json
        api_surface_files:
          - src/api/routes/stage3.py
          - src/api/schemas/stage3.py
        repository_files: []
        test_files:
          - tests/test_internal_chain.py
          - tests/test_formal_sink_fields.py
        depends_on_slices:
          - stage3.project_parsing
        target_packet_candidates:
          - PTL-S34-object-lineage-verification-handoff
        exit_criteria:
          - "候选对象和项目经理对象进入 Stage4 前保持 lineage 可追溯。"
        deferred_gaps: []
  - stage_id: stage4_verification
    stage_name: "Stage4 公开核验与冲突预判"
    business_summary: "围绕 Stage3 对象做公开核验、攻击面识别、证据等级判断和竞争信号预判。"
    implementation_state: PARTIAL_RUNTIME
    current_runtime_state: PARTIAL_RUNTIME
    customer_visibility: INTERNAL_ONLY
    depends_on_modules:
      - stage3_parsing
    target_packet_candidates:
      - PTL-S45-rule-evidence-dual-gate
    current_blockers:
      - "已完成主链闭合；B/C 高风险能力仍按 D13 边界治理。"
    exit_criteria:
      - "public_attack_surface / verification profile / evidence grade 输出给 Stage5。"
      - "核验结果不得被写成终局违法结论。"
    module_slices:
      - slice_id: stage4.public_verification
        business_summary: "核验项目、候选对象、人员等公开可查事实。"
