          - handoff/stage5_to_stage6/contract.json
        api_surface_files:
          - src/api/routes/stage5.py
          - src/api/schemas/stage5.py
        repository_files: []
        test_files:
          - tests/test_stage56_evaluators.py
          - tests/test_internal_chain.py
        depends_on_slices:
          - stage4.attack_surface_evidence_grade
        target_packet_candidates:
