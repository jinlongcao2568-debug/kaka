version: 1
registry_id: PRODUCT_MODULE_REGISTRY
status: ACTIVE
purpose: >
  Track product modules, current implementation files, stage ownership,
  document sources, deferred module splits, and target packets so future
  packets do not rely on conversational memory.
source_priority:
  product_direction: control/product_task_library.yaml
  active_execution_source: control/current_task.yaml
  product_stage_navigation: docs/AX9S_开发执行路由图.md
  authority_docs:
    - docs/L0.md
    - docs/D1_研发_Codex执行手册.md
    - docs/D2_正式对象契约与字段字典.md
    - docs/D3_正式规则码总表与判定说明书.md
    - docs/D4_OpenAPI接口契约.md
    - docs/D5_页面导出与人工复核规范.md
    - docs/D6_字段策略字典与客户交付字段规范.md
    - docs/D7_对象级交付矩阵与外发治理规范.md
    - docs/D8_真实竞争者识别可售对象与销售推进规范.md
    - docs/D9_联系对象与销售触达规范.md
    - docs/D10_订单支付交付与治理反馈规范.md
    - docs/D11_测试验收与金标回归清单.md
    - docs/D12_部署发布与运行治理规范.md
    - docs/D13_公开可查边界能力清单.md
    - docs/D14_AI模型治理规范.md
open_capability_policy_ref: control/product_task_library.yaml#open_capability_policy
open_capability_policy_id: PTL-I100-OPEN-CAPABILITY-BASELINE
open_capability_policy_summary:
  sold_product: evidence_pack_and_leadpack
  software_role: owner_operated_tooling_and_customer_artifact_access
  default_live_state: BLOCKED_BY_DEFAULT_UNTIL_GATED
  target_capability_semantics: "blocked-by-default means gated target capability, not permanent out-of-scope"
  target_capabilities:
    - real_public_source_collection
    - parsing_ocr_and_attachment_processing
    - public_verification
    - crm_quote
    - leadpack_page_export
    - sales_outreach
    - payment_collection_and_charge
    - delivery_fulfillment
    - receipt_invoice_and_settlement
  excluded_capabilities:
    - automated_refund_execution
    - private_or_non_public_data_collection
    - gray_source_collection
    - captcha_or_login_bypass
  refund_boundary: "automated_refund_execution is excluded; refund handling remains manual exception record, manual approval/audit, and governed review only"
  required_gates:
    - provider_config
    - sandbox_pass
    - approval_chain
    - audit_chain
    - operator_action_record
    - field_allowlist_and_masking
    - dedicated_current_task_packet
    - PTL-I100-118-full-product-operational-acceptance
registry_rules:
  not_a_status_source: true
  not_a_release_gate: true
  not_a_second_product_direction_source: true
  update_when:
    - product_mainline_packet_completed
    - deferred_module_split_identified
    - new_module_surface_added
    - packet_scope_depends_on_future_module
    - module_dependency_or_exit_criteria_changed
    - api_storage_or_test_surface_changed
post_mainline_selection:
  mainline_state: MAINLINE_CLOSED
  automatic_next_candidate_disabled: true
  mainline_closeout_ref: PTL-GOV-117-product-mainline-completion-closeout
  selection_state: OPEN_FOR_MANUAL_SELECTION
  recommended_direction_label: "Stage9 governed delivery 深化"
  recommendation_is_navigation_only: true
  detailed_execution_ladder_ref: "control/product_task_library.yaml#post_mainline_execution_ladder"
  detailed_execution_scope: "PRODUCT_ONLY"
  execution_management_notes:
    - "Execution-level management and reporting should use control/product_task_library.yaml#post_mainline_execution_ladder and its P1 -> P8 task_ids."
    - "Direction labels such as Stage8 governed touch 深化 / Stage9 governed delivery 深化 remain navigation-only and must not replace P1-P8 task_ids in execution-level communication."
  detailed_execution_bridge:
    completed_stage8_task_ids:
      - PTL-S8-101-p1-candidate-compliance-boundary-refactor
      - PTL-S8-102-p2-plan-touch-productization
    stage8_task_ids:
      - PTL-S8-101-p1-candidate-compliance-boundary-refactor
      - PTL-S8-102-p2-plan-touch-productization
    shared_platform_task_ids:
      - PTL-INT-101-p3-policy-validator-boundary-split
      - PTL-INT-102-p4-repository-boundary-hardening
    stage9_task_ids:
      - PTL-S9-101-p5-typed-lifecycle-deepening
      - PTL-S9-102-p6-feedback-writeback-productization
    foundational_followup_task_ids:
      - PTL-INT-103-p7-stage1-to-stage5-contract-runtime-completion
      - PTL-INT-104-p8-observability-operator-workbench
    non_product_followups_outside_pool:
      - PTL-GOV-126-p0-current-governance-closeout
      - PTL-GOV-127-p0b-ax9s-navigation-sync
      - PTL-GOV-128-p9-future-unlock-prep-only
  direction_candidates:
    - direction_label: "Stage7 模块边界重构"
      future_packet_id_suggestion: PTL-S7-module-boundary-refactor
      related_modules:
        - STAGE7-SALES-DERIVATION
        - SHARED-RUNTIME-POLICY-CHAIN
      recommended_now: false
      status: COMPLETED
      not_auto_activated: true
      completed_ref: PTL-S7-module-boundary-refactor
      rationale: "优先收敛 Stage7 重 runtime 文件边界与消费边界，降低后续 Stage8/9 耦合；仅作内部产品方向导航建议，不自动进入候选池。"
    - direction_label: "Internal preview 产品化强化"
      future_packet_id_suggestion: PTL-INT-internal-preview-productization-strengthening
      related_modules:
        - INTERNAL-PREVIEW-SURFACE
        - SURFACE-API-TRANSPORT
      recommended_now: false
      status: COMPLETED
      not_auto_activated: true
      completed_ref: PTL-INT-internal-preview-productization-strengthening
      rationale: "内部预览产品化强化已完成并提交；当前只保留为后主线已完成方向记录，不自动恢复候选池。"
    - direction_label: "Stage8 governed touch 深化"
      future_packet_id_suggestion: PTL-S8-governed-touch-deepening
      related_modules:
        - STAGE8-OUTREACH-GOVERNED
        - INTERNAL-PREVIEW-SURFACE
      recommended_now: false
      status: COMPLETED
      not_auto_activated: true
      completed_task_ids:
        - PTL-S8-101-p1-candidate-compliance-boundary-refactor
        - PTL-S8-102-p2-plan-touch-productization
      remaining_task_ids: []
      last_completed_commit: 9d4662a
      rationale: "P1/P2 已完成并分别记录 632c6ae / 9d4662a；Stage8 governed touch 方向的 candidate/compliance 与 plan/touch 产品化边界均已收口，但 external/live redline 不变，仍不触发 real execution。"
    - direction_label: "Stage9 governed delivery 深化"
      future_packet_id_suggestion: PTL-S9-governed-delivery-deepening
      related_modules:
        - STAGE9-DELIVERY-GOVERNANCE
        - STORAGE-REPOSITORY-BOUNDARY
      recommended_now: false
      status: COMPLETED
      not_auto_activated: true
      completed_task_ids:
        - PTL-S9-101-p5-typed-lifecycle-deepening
        - PTL-S9-102-p6-feedback-writeback-productization
      remaining_task_ids: []
      last_completed_commit: edff5af
      rationale: "P5 typed lifecycle deepening 与 P6 feedback/writeback 产品化均已完成并分别记录 3d9fc74 / edff5af；Stage9 governed delivery 方向当前已闭合，但仍只代表 internal governed runtime 收口，不放开 real payment / delivery / refund，也不等同 external/live 完成。"
ledger_schema:
  intent: >
    Give non-technical product ownership and future AI windows a machine-readable
    product module ledger. It records what exists, what is partial, what is
    deferred, what depends on what, and which future packet should close the gap.
  required_stage_fields:
    - stage_id
    - stage_name
    - business_summary
    - implementation_state
    - current_runtime_state
    - customer_visibility
    - depends_on_modules
    - target_packet_candidates
    - current_blockers
    - exit_criteria
    - module_slices
  required_slice_fields:
    - slice_id
    - business_summary
    - implementation_state
    - current_files
    - handoff_files
    - api_surface_files
    - repository_files
    - test_files
    - depends_on_slices
    - target_packet_candidates
    - exit_criteria
    - deferred_gaps
  implementation_state_vocab:
    - IMPLEMENTED
    - PARTIAL_RUNTIME
    - HEAVY_RUNTIME_INTERNAL_GOVERNED
    - CONTRACT_OR_HANDOFF_ONLY
    - DOC_ALIGNED_NOT_IMPLEMENTED
    - DEFERRED_MODULE_SPLIT
    - GOVERNANCE_BLOCKED_LIVE_EXECUTION
  customer_visibility_vocab:
    - INTERNAL_ONLY
    - INTERNAL_GOVERNED
    - LEADPACK_CANDIDATE_GATED
    - EXTERNAL_BLOCKED
stage_module_inventory:
  - stage_id: stage1_tasking
    stage_name: "Stage1 任务编排与时钟管理"
    business_summary: "把产品任务、来源策略、路由、时钟和执行上下文固定下来，防止后续阶段从临时输入启动。"
    implementation_state: PARTIAL_RUNTIME
    current_runtime_state: PARTIAL_RUNTIME
    customer_visibility: INTERNAL_ONLY
    depends_on_modules: []
    target_packet_candidates:
      - PTL-S12-source-route-clock-authority
    current_blockers:
      - "已完成主链闭合；后续只在来源策略或调度策略变更时更新本总账。"
    exit_criteria:
      - "任务、来源、路由、时钟和 execution context 都能被 Stage2 handoff 消费。"
      - "后续窗口不得绕开 current_task / source route authority 直接启动采集。"
    module_slices:
      - slice_id: stage1.execution_context
        business_summary: "生成受控执行上下文，承接任务身份、来源策略、默认路由和时钟口径。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage1_tasking/service.py
          - src/stage1_tasking/contract_runtime.py
          - src/stage1_tasking/models.py
        handoff_files:
          - handoff/stage1_to_stage2/contract.json
        api_surface_files:
          - src/api/routes/stage1.py
          - src/api/schemas/stage1.py
        repository_files:
          - src/storage/repositories/work_item_repo.py
        test_files:
          - tests/test_stage12_extractors.py
          - tests/test_pre_route_behavior.py
        depends_on_slices: []
        target_packet_candidates:
          - PTL-S12-source-route-clock-authority
        exit_criteria:
          - "execution context 字段稳定输出到 H-01。"
          - "API projection 不得重造任务路由语义。"
        deferred_gaps: []
      - slice_id: stage1.source_route_clock
        business_summary: "管理来源抽取、调度和时钟窗口，确保 Stage2 公开链采集只消费正式 route/clock。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage1_tasking/extractors.py
          - src/stage1_tasking/scheduler.py
        handoff_files:
          - handoff/stage1_to_stage2/contract.json
        api_surface_files:
          - src/api/routes/stage1.py
          - src/api/schemas/stage1.py
        repository_files:
          - src/storage/repositories/work_item_repo.py
        test_files:
          - tests/test_stage12_extractors.py
          - tests/test_pre_route_behavior.py
        depends_on_slices:
          - stage1.execution_context
        target_packet_candidates:
          - PTL-S12-source-route-clock-authority
        exit_criteria:
          - "source / route / clock 字段能够进入 Stage2，不由 Stage2 临时补造。"
        deferred_gaps: []
  - stage_id: stage2_ingestion
    stage_name: "Stage2 公开链抓取与固定化"
    business_summary: "把公开来源、版本链、时钟链和固定化输入转成 Stage3 可解析的正式公开链。"
    implementation_state: PARTIAL_RUNTIME
    current_runtime_state: PARTIAL_RUNTIME
    customer_visibility: INTERNAL_ONLY
    depends_on_modules:
      - stage1_tasking
    target_packet_candidates:
      - PTL-S23-public-chain-to-parser-contract
    current_blockers:
      - "已完成主链闭合；外部采集系统接入仍不在当前范围。"
    exit_criteria:
      - "public_chain / notice_version_chain / clock_chain_profile 能通过 H-02 固定输出。"
      - "Stage3 不直接读取原始来源重新决定版本链。"
    module_slices:
      - slice_id: stage2.public_chain_ingestion
        business_summary: "从 Stage1 路由消费公开来源，形成 public_chain 和公开载体集合。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage2_ingestion/service.py
          - src/stage2_ingestion/contract_runtime.py
          - src/stage2_ingestion/extractors.py
          - src/stage2_ingestion/models.py
        handoff_files:
          - handoff/stage2_to_stage3/contract.json
        api_surface_files:
          - src/api/routes/stage2.py
          - src/api/schemas/stage2.py
        repository_files:
          - src/storage/repositories/work_item_repo.py
        test_files:
          - tests/test_stage12_extractors.py
          - tests/test_pre_route_behavior.py
        depends_on_slices:
          - stage1.source_route_clock
        target_packet_candidates:
          - PTL-S23-public-chain-to-parser-contract
        exit_criteria:
          - "公开链字段有来源、版本和固定化 trace。"
        deferred_gaps: []
      - slice_id: stage2.fixation_version_clock
        business_summary: "固定公告版本链和制度时钟，给 Stage3/Stage6 后续判断提供可追溯输入。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
          - src/stage2_ingestion/fixation.py
          - src/stage2_ingestion/models.py
        handoff_files:
          - handoff/stage2_to_stage3/contract.json
        api_surface_files:
          - src/api/routes/stage2.py
          - src/api/schemas/stage2.py
        repository_files: []
        test_files:
          - tests/test_stage12_extractors.py
          - tests/test_formal_sink_fields.py
        depends_on_slices:
          - stage2.public_chain_ingestion
        target_packet_candidates:
          - PTL-S23-public-chain-to-parser-contract
        exit_criteria:
          - "fixation bundle 与 clock chain profile 可被 Stage3 和后续 formal sink 消费。"
        deferred_gaps: []
  - stage_id: stage3_parsing
    stage_name: "Stage3 结构化解析与关键对象抽取"
    business_summary: "把公开链解析成项目、字段 lineage、候选对象和项目经理等正式真相层输入。"
    implementation_state: PARTIAL_RUNTIME
    current_runtime_state: PARTIAL_RUNTIME
    customer_visibility: INTERNAL_ONLY
    depends_on_modules:
      - stage2_ingestion
    target_packet_candidates:
      - PTL-S34-object-lineage-verification-handoff
    current_blockers:
      - "已完成主链闭合；后续细化 parser 不得绕开 lineage。"
    exit_criteria:
      - "project_base / field_lineage_record / bidder_candidate / project_manager 均有来源 trace。"
      - "Stage4 只消费 Stage3 正式对象和 lineage。"
    module_slices:
      - slice_id: stage3.project_parsing
        business_summary: "抽取项目基础对象和项目关键字段。"
        implementation_state: PARTIAL_RUNTIME
        current_files:
