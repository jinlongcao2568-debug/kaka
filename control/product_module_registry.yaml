    stage_name: "Stage5 规则与证据"
    business_summary: "把 Stage4 核验对象转成规则命中、证据对象、双闸门决策和人工复核请求。"
    implementation_state: PARTIAL_RUNTIME
    current_runtime_state: PARTIAL_RUNTIME
    customer_visibility: INTERNAL_ONLY
    depends_on_modules:
      - stage4_verification
    target_packet_candidates:
      - PTL-S45-rule-evidence-dual-gate
    current_blockers:
      - "已完成主链闭合；新增规则码必须另走 D3/测试同步，不在本包新增。"
    exit_criteria:
      - "rule_gate_decision 与 evidence_gate_decision 缺一不可。"
