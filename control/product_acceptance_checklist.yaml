version: 1
checklist_id: PTL-I100-PRODUCT-ACCEPTANCE-CHECKLIST
status: EFFECTIVE
updated_at: "2026-04-25"
policy_ref: control/product_task_library.yaml#open_capability_policy
scope: "PTL-I100 remaining product-operability tasks"
source_priority: "current_task -> product_task_library -> repo_status"
final_product_closure_gate: PTL-I100-118-full-product-operational-acceptance
refund_boundary: "automated refund execution is excluded; refund handling is manual exception record, manual approval/audit, and governed review only"
state_order:
  - NOT_IMPLEMENTED
  - INTERNAL_READY
  - SANDBOX_READY
  - APPROVAL_READY
  - LIVE_READY
  - PRODUCTION_READY
  - SUSPENDED
global_acceptance_layers:
  engineering_regression:
    required: true
    minimum_evidence:
      - "git status before and after"
      - "actual diff reviewed against allowed paths"
      - "targeted tests for changed capability"
      - "formal task-packet check"
      - "full regression or documented packet-approved substitute"
      - "check-state-alignment"
      - "git diff --check"
  capability_state:
    required: true
    minimum_evidence:
      - "before_state"
      - "after_state"
      - "why state movement is justified"
      - "controlled-opening-required/live controlled_opening_boundaries preserved until gates pass"
      - "rollback or suspension path for APPROVAL_READY and above"
  product_closure:
    required: true
    minimum_evidence:
      - "owner usable scenario"
      - "customer-visible boundary when applicable"
      - "audit/readback/replay evidence"
      - "manual review path for uncertain or high-risk outputs"
      - "remaining blockers and next packet"
minimum_formal_checks:
  - "pwsh -NoProfile -ExecutionPolicy Bypass -Command '$paths = @(<actual changed paths>); & ''scripts/check-task-packet.ps1'' -PlannedTargetPaths $paths'"
  - "pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-task-packet.ps1"
  - "python tests/run_tests.py"
  - "pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/check-state-alignment.ps1"
  - "git diff --check"
  - "git status --short --untracked-files=all"
live_or_external_gate_requirements:
  - provider_config
  - sandbox_pass
  - approval_chain
  - audit_chain
  - operator_action_record
  - field_allowlist_and_masking
  - credential_redaction
  - opt_out_or_customer_access_control_when_applicable
  - rate_limit_timeout_retry_when_applicable
  - suspension_and_rollback_path
  - no_silent_fallback
public_data_boundary_requirements:
  - public_visible_source_only
  - source_url_snapshot_hash_and_lineage
  - weak_public_or_uncertain_data_degrades_to_review
  - model_or_inference_never_becomes_customer_fact_without_review
reporting_contract:
  required_fields:
    - modified_files
    - per_file_changes
    - targeted_tests
    - formal_checks
    - capability_state_movement
    - product_closure_result
    - live_or_external_boundary_result
    - refund_boundary_result
    - blockers
    - next_step_recommendation
tasks:
  PTL-I100-144A-controlled-opening-sync:
    target_capability_state: APPROVAL_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "所有非 automated_refund_execution 的 hard boundary 断言都已迁移为 controlled opening / 受控开放能力口径。"
      - "docs/control/contracts/scripts/runtime/tests 同批同步，不再保留非自动退款的硬边界 命名或永久阻断语义。"
      - "automated_refund_execution 继续 EXCLUDED，且没有自动退款程序、自动退款 endpoint 或自动退款 provider action。"
      - "本包不执行真实 provider、真实触达、真实支付、真实交付、真实退款、客户下载或 public software release。"
    targeted_test_expectations:
      - product_acceptance_checklist
      - product_runtime_architecture_map
      - product_operability_gap_matrix
      - api_transport_bootstrap
      - runtime_governance_guards
      - state_alignment
      - task_packet
    controlled_opening_boundary_checks:
      - controlled_opening_semantics_synced
      - non_refund_hard_boundaries_removed
      - automated_refund_execution_excluded
      - no_real_external_action_executed
    live_or_external_gate_requirements:
      - provider_config
      - sandbox_pass
      - approval_chain
      - audit_chain
      - operator_action_record
      - field_allowlist_and_masking
      - suspension_and_rollback_path
    refund_boundary: "automated refund execution remains excluded; real refund remains controlled opening with manual exception, approval, audit, and governed review."
  PTL-I100-111-live-provider-adapters-no-auto-refund:
    target_capability_state: SANDBOX_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "111B/111C/111D adapter paths share provider config/readiness and do not bypass it"
      - "sandbox/dry-run execution records are repository-backed and replayable"
      - "live defaults remain blocked until dedicated live-pilot packets"
      - "automated refund program remains absent"
    targeted_test_expectations:
      - provider_adapter_config
      - stage7_crm_quote_or_page_readback
      - stage8_outreach_readback
      - stage9_payment_delivery_readback
