  PTL-I100-128-real-public-source-field-validation-and-coverage:
    target_capability_state: PRODUCTION_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "114A-114I source adapters 必须用真实公开样本或受控手工 snapshot 验证字段覆盖、hash/lineage、parser 输出、Stage4 核验与失败降级。"
      - "不得访问 private/gray source，不得绕过登录、验证码、权限或反爬。"
      - "必须输出 source coverage report，区分可抓、弱公开、失败、暂停和需人工复核。"
    targeted_test_expectations:
      - real_public_source_sample_matrix
      - parser_field_coverage_report
      - public_verification_replay
      - public_boundary_guards
    redline_checks:
      - public_only_boundary_locked
      - no_login_captcha_or_gray_source_bypass
      - weak_or_failed_sources_degrade_to_review
  PTL-I100-129-real-provider-binding-wecom-email-crm-payment-delivery-no-auto-refund:
    target_capability_state: PRODUCTION_READY
    refund_boundary: "manual exception/governed review only; no automated refund execution"
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "企业微信机器人、邮件、短信/电话、CRM、报价、支付、交付 provider 必须通过统一 provider config、credential redaction、sandbox pass、approval/audit、operator action、reliability/circuit breaker 接入。"
      - "真实 provider sandbox/live 结果、webhook/callback、bounce/failure/complaint、settlement/reconciliation 和 delivery download audit 必须可持久化、可回放。"
      - "自动退款程序保持 absent；退款只允许 manual exception / approval-audit / governed review。"
    targeted_test_expectations:
      - real_provider_config_binding
      - wecom_robot_provider_path
      - payment_delivery_provider_callback
      - runtime_governance_guards
    redline_checks:
      - provider_live_requires_approval_audit
      - no_silent_live_fallback
      - automated_refund_absent
  PTL-I100-130-llm-assisted-parsing-review-and-sales-governance:
    target_capability_state: APPROVAL_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "LLM 只能作为字段抽取候选、OCR/表格解析辅助、证据摘要、人工复核提示和销售话术草稿辅助。"
      - "模型输出不得直接写 formal fact，不得直接成为客户结论，不得绕过人工复核、来源定位、证据等级和模型治理审计。"
      - "prompt/output/provider trace、评测 golden cases、隐私/公开数据边界和人工复核状态必须可回放。"
    targeted_test_expectations:
      - model_assist_governance
      - parser_review_assist
      - sales_talk_track_draft
      - runtime_governance_guards
    redline_checks:
      - model_output_not_final_fact
      - human_review_required_for_customer_visible_claim
      - no_private_data_to_model_without_policy
  PTL-I100-131-controlled-real-world-e2e-pilot-and-closeout:
    target_capability_state: PRODUCTION_READY
    final_product_closeout_candidate: true
    refund_boundary: "manual exception/governed review only; no automated refund execution"
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "owner 能用真实公开样本完成 source -> parser -> verification -> rules -> product package -> challenger -> CRM/quote -> outreach -> payment -> delivery -> audit/writeback 的受控端到端试点。"
      - "客户可见 artifact 必须经过字段策略、脱敏、水印、approval/audit、download auth、版本 hash 和下载审计。"
      - "真实 provider 路径必须至少通过 sandbox 或审批后小样本 live；自动退款保持 excluded。"
    targeted_test_expectations:
      - real_world_e2e_pilot
      - customer_artifact_delivery_audit
      - provider_paths_verified
      - runtime_governance_guards
    redline_checks:
      - owner_can_complete_e2e_business_flow
      - automated_refund_absent
      - no_public_software_release_default
    current_131_closeout_result:
      acceptance_result: CONTROLLED_REAL_WORLD_E2E_ACCEPTED
      engineering_regression_result: PASS_REQUIRED_BY_131_CHECKS
      capability_state_result: VERIFIED_CONTROLLED_OWNER_OPERABLE_PRODUCTION_READY
      product_closure_result: CONTROLLED_REAL_WORLD_CLOSED
      owner_end_to_end_real_world_sales_delivery_operable: true
      closeout_recommendation: PRODUCTION_CLOSEOUT_READY_FOR_OWNER_OPERATED_CONTROLLED_USE
      report_ref: control/controlled_real_world_e2e_pilot_report.yaml
      remaining_product_blockers: []
  PTL-I100-132-owner-operator-frontend-productization-workbench:
    target_capability_state: PRODUCTION_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "owner console 必须展示 Stage1-9 运营总览、证据链、销售闭环、客户交付、支付交付、provider/scheduler/audit/readback 和红线，不要求 owner 直接记 raw API。"
      - "customer artifact portal 在已有 artifact readback 时必须展示访问控制、字段策略、download auth、download audit；在无 readback 时必须显示可理解空状态而不是浏览器错误。"
      - "前端不得把 internal blackbox score、未复核推断、private/gray 数据、未审批材料、真实下载链接或 live execution 表达成已开放。"
    targeted_test_expectations:
      - frontend_operator_productized_workbench
      - customer_artifact_portal_empty_state
      - api_transport_bootstrap
      - runtime_governance_guards
    redline_checks:
      - no_public_software_release_default
      - no_unapproved_live_provider_execution
      - no_real_payment_delivery_refund_default
      - customer_access_requires_approval_audit
      - field_allowlist_and_masking_enforced
    current_132_frontend_result:
      acceptance_result: OWNER_FRONTEND_PRODUCTIZED
      engineering_regression_result: PASS_REQUIRED_BY_132_CHECKS
      capability_state_result: VERIFIED_OWNER_OPERABLE_FRONTEND_PRODUCTION_READY
      product_closure_result: CONTROLLED_FRONTEND_ALIGNED_WITH_BACKEND
      owner_console_productized: true
      customer_portal_empty_state_supported: true
      public_software_release_enabled: false
      live_execution_enabled_by_frontend: false
      automated_refund_execution_enabled: false
  PTL-I100-133A-real-public-entry-url-fetcher-and-allowlist:
    target_capability_state: INTERNAL_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "真实公开入口样本必须是浏览器实测可打开的总入口/列表/查询页，不得只用固定详情页冒充系统任务入口。"
      - "fetcher 只能访问显式 allowlist 的 public URL，保存 HTML 快照、title、content-type、byte_size、sha256、fetch audit、source lineage 和 browser verification evidence。"
      - "入口页必须能发现同站详情链接；详情链接只作为下一跳验证摘要，不做任意 crawler、翻页深爬或跨站抓取。"
      - "404、错误页、登录页、验证码、人机校验、JS 空壳、private/gray source 必须 fail closed / review required，不得绕过。"
    targeted_test_expectations:
      - stage2_real_public_url_fetcher
      - product_module_registry
      - product_acceptance_checklist
      - product_operability_gap_matrix
      - stage2_public_source_adapters_regression
      - runtime_governance_guards
    redline_checks:
      - browser_verified_total_entry_urls_recorded
      - no_unregistered_url_fetch
      - no_login_captcha_or_anti_bot_bypass
      - no_uncontrolled_crawler
      - no_real_provider_call
      - no_external_execution_side_effect
  PTL-I100-133B-national-verification-source-entry-fetchers:
    target_capability_state: INTERNAL_READY
    required_acceptance_layers: [engineering_regression, capability_state, product_closure]
    completion_must_prove:
      - "国家核验入口只允许官方 URL allowlist：四库一平台 home/company/person/project，以及 Credit China / GSXT 官方入口。"
      - "四库一平台 raw fetch 返回 200+SPA 壳时，必须稳定落到 fail-closed/readback，不得误判为已拿到可解析正文。"
      - "Credit China 412、GSXT 521 必须作为真实运行时阻断结果记录下来，不得 fallback、不得伪装成成功入口。"
      - "仍不做任意 crawler、登录/验证码/反爬绕过、真实 provider 调用、真实客户下载、真实退款或自动退款。"
    targeted_test_expectations:
      - stage2_real_public_url_fetcher
      - product_acceptance_checklist
      - product_operability_gap_matrix
      - controlled_real_world_e2e_closeout
      - stage12_extractors
      - external_unlock_prerequisites
      - stage2_public_source_adapters_regression
      - runtime_governance_guards
    redline_checks:
      - official_national_verification_entry_urls_registered
      - jzsc_raw_shell_fail_closed
      - creditchina_412_fail_closed
      - gsxt_521_fail_closed
      - no_uncontrolled_crawler
      - no_real_provider_call
